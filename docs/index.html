<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<base href="./">
	<title>Three.js Quake</title>
	<link rel="icon" type="image/svg+xml" href="./icon.svg">
	<link rel="apple-touch-icon" href="./icon.png">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		:root {
			--qc-bg-0: #150c06;
			--qc-bg-1: #241208;
			--qc-bg-2: #0c0602;
			--qc-border-dark: #2c1709;
			--qc-border-mid: #6f4926;
			--qc-border-hi: #b57a40;
			--qc-text-main: #dbb277;
			--qc-text-dim: #ab7b46;
			--qc-text-hi: #efc98f;
			--qc-track-dark: #2d1a0d;
			--qc-track-hi: #8e5d31;
			--qc-thumb: #c4894a;
			--qc-thumb-hi: #e0b06e;
		}
		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #000;
		}
		canvas {
			display: block;
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			height: 100%;
		}
		#loading {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 100;
			background: #000;
		}
		#loading-bar {
			width: 200px;
			height: 2px;
			background: #333;
		}
		#loading-progress {
			width: 0%;
			height: 100%;
			background: #fff;
		}
		#quantum-controls {
			position: fixed;
			top: 42px;
			right: 10px;
			width: 256px;
			max-height: calc(100vh - 52px);
			overflow-y: auto;
			overflow-x: hidden;
			overscroll-behavior: contain;
			padding: 10px;
			border: 2px solid var(--qc-border-mid);
			outline: 1px solid var(--qc-border-dark);
			background:
				repeating-linear-gradient(0deg, rgba(255, 190, 110, 0.045) 0 1px, rgba(0, 0, 0, 0) 1px 3px),
				linear-gradient(180deg, rgba(52, 30, 13, 0.96) 0%, rgba(26, 14, 7, 0.96) 36%, rgba(10, 6, 2, 0.98) 100%);
			color: var(--qc-text-main);
			font-family: "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
			font-size: 12px;
			line-height: 1.3;
			text-shadow: 1px 1px 0 #000;
			box-shadow:
				inset 0 0 0 1px rgba(222, 168, 94, 0.24),
				inset 0 -1px 0 rgba(0, 0, 0, 0.75),
				0 4px 14px rgba(0, 0, 0, 0.82);
			z-index: 250;
			pointer-events: auto;
		}
		#qc-screen-toggle {
			position: fixed;
			top: 10px;
			right: 10px;
			min-width: 56px;
			height: 24px;
			padding: 0 10px;
			border: 2px solid var(--qc-border-mid);
			outline: 1px solid var(--qc-border-dark);
			background:
				linear-gradient(180deg, rgba(52, 30, 13, 0.96) 0%, rgba(26, 14, 7, 0.98) 100%);
			color: var(--qc-text-hi);
			font-family: "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
			font-size: 12px;
			font-weight: 700;
			line-height: 1;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			text-shadow: 1px 1px 0 #000;
			box-shadow:
				inset 0 0 0 1px rgba(222, 168, 94, 0.24),
				inset 0 -1px 0 rgba(0, 0, 0, 0.75),
				0 4px 10px rgba(0, 0, 0, 0.82);
			cursor: pointer;
			z-index: 260;
		}
		#qc-screen-toggle:hover {
			color: #ffd8a3;
			border-color: var(--qc-border-hi);
		}
		.qc-title {
			font-size: 14px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: #e8bc7c;
			margin-bottom: 9px;
			padding-bottom: 5px;
			border-bottom: 1px solid rgba(163, 108, 55, 0.42);
			text-shadow: 0 1px 0 #000, 0 0 8px rgba(212, 126, 52, 0.16);
		}
		#quantum-controls.qc-minimized {
			display: none;
		}
		.qc-row {
			display: grid;
			grid-template-columns: 1fr auto;
			grid-template-rows: auto auto;
			column-gap: 8px;
			row-gap: 4px;
			margin-bottom: 8px;
		}
		.qc-row > span:first-child {
			grid-column: 1 / 2;
			color: var(--qc-text-main);
			letter-spacing: 0.04em;
			font-weight: 700;
			text-transform: uppercase;
		}
		.qc-row > input,
		.qc-row > select {
			grid-column: 1 / 2;
			width: 100%;
			min-width: 0;
			background: linear-gradient(180deg, rgba(44, 26, 12, 0.96) 0%, rgba(25, 15, 7, 0.98) 100%);
			color: var(--qc-text-hi);
			border: 1px solid rgba(146, 97, 52, 0.86);
			outline: 1px solid rgba(33, 18, 8, 0.82);
			font-family: "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
		}
		.qc-row > select {
			height: 24px;
			padding: 2px 4px;
			font-size: 12px;
			font-weight: 700;
		}
		.qc-row > input[type="checkbox"] {
			appearance: none;
			-webkit-appearance: none;
			height: 14px;
			width: 14px;
			align-self: center;
			margin-top: 2px;
			background: #1e1108;
			border: 1px solid var(--qc-border-mid);
			box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.7);
		}
		.qc-row > input[type="checkbox"]:checked {
			background: linear-gradient(180deg, #c89555 0%, #8d5b2f 100%);
			border-color: var(--qc-border-hi);
		}
		.qc-row > input[type="range"] {
			appearance: none;
			-webkit-appearance: none;
			height: 16px;
			background: transparent;
			border: 0;
			outline: none;
		}
		.qc-row > input[type="range"]::-webkit-slider-runnable-track {
			height: 7px;
			border: 1px solid var(--qc-border-mid);
			background: linear-gradient(180deg, var(--qc-track-hi) 0%, var(--qc-track-dark) 100%);
			box-shadow: inset 0 1px 0 rgba(255, 205, 139, 0.16);
		}
		.qc-row > input[type="range"]::-webkit-slider-thumb {
			appearance: none;
			-webkit-appearance: none;
			width: 13px;
			height: 13px;
			margin-top: -4px;
			border: 1px solid #2e1a0b;
			background: linear-gradient(180deg, var(--qc-thumb-hi) 0%, var(--qc-thumb) 100%);
			box-shadow: 0 0 0 1px rgba(255, 212, 150, 0.2) inset;
		}
		.qc-row > input[type="range"]::-moz-range-track {
			height: 7px;
			border: 1px solid var(--qc-border-mid);
			background: linear-gradient(180deg, var(--qc-track-hi) 0%, var(--qc-track-dark) 100%);
			box-shadow: inset 0 1px 0 rgba(255, 205, 139, 0.16);
		}
		.qc-row > input[type="range"]::-moz-range-thumb {
			width: 13px;
			height: 13px;
			border: 1px solid #2e1a0b;
			background: linear-gradient(180deg, var(--qc-thumb-hi) 0%, var(--qc-thumb) 100%);
			box-shadow: 0 0 0 1px rgba(255, 212, 150, 0.2) inset;
		}
		.qc-row > span:last-child {
			grid-column: 2 / 3;
			grid-row: 1 / 3;
			align-self: center;
			justify-self: end;
			color: var(--qc-text-hi);
			font-weight: 600;
			font-family: "Courier New", monospace;
			letter-spacing: 0.03em;
		}
		.qc-meta {
			margin-top: 7px;
			color: var(--qc-text-dim);
			font-family: "Courier New", monospace;
			letter-spacing: 0.03em;
		}
		@media (max-width: 900px) {
			#quantum-controls {
				width: 220px;
				top: 40px;
				right: 8px;
				max-height: calc(100vh - 48px);
				padding: 8px;
			}
			#qc-screen-toggle {
				top: 8px;
				right: 8px;
			}
		}
	</style>
</head>
<body>
	<div id="loading">
		<div id="loading-bar"><div id="loading-progress"></div></div>
	</div>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
		}
	}
	</script>
	<script src="./moonlab.js"></script>
	<script type="module" src="./main.js"></script>
</body>
</html>
